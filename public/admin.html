<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель ЕдаТут</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #F7F8FA;
      --card-bg: #FFFFFF;
      --primary: #667eea;
      --text-main: #1A1D21;
      --text-secondary: #8E9AA5;
      --border: #E8EAED;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 20px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 16px;
      border-radius: 0 0 20px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(118, 75, 162, 0.2);
    }
    .header h1 { margin: 0; font-size: 22px; }
    .header p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 14px;      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* Orders List */
    .orders-container {
      padding: 0 16px;
    }
    .refresh-btn {
      width: 100%;
      padding: 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 12px;
      transition: 0.2s;
    }
    .refresh-btn:active { transform: scale(0.98); }

    .order-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    
    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .order-id { font-weight: 700; font-size: 16px; }
    
    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-pending { background: #FEF3C7; color: #D97706; }
    .status-cooking { background: #DBEAFE; color: #2563EB; }    .status-delivering { background: #FCE7F3; color: #DB2777; }
    .status-delivered { background: #D1FAE5; color: #059669; }
    .status-cancelled { background: #FEE2E2; color: #DC2626; }

    .order-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .order-items-box {
      background: #F9FAFB;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    
    select.status-select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .error-box { background: #FEE2E2; color: #DC2626; padding: 12px; border-radius: 10px; text-align: center; margin: 16px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔧 Админ-панель</h1>
    <p>Управление заказами Foodhub</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-new">0</div>
      <div class="stat-label">🆕 Новых</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-active">0</div>
      <div class="stat-label">🔥 В работе</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-count">0</div>
      <div class="stat-label">📦 Всего</div>
    </div>
    <div class="stat-card">      <div class="stat-value" id="stat-revenue">0₽</div>
      <div class="stat-label">💰 Выручка</div>
    </div>
  </div>

  <div class="orders-container">
    <button class="refresh-btn" onclick="loadOrders()">🔄 Обновить список</button>
    <div id="orders-list"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // !!! ВАЖНО: Укажи здесь свой Telegram ID (ADMIN_ID) !!!
    const MY_ID = 8043971654; 
    const userId = tg.initDataUnsafe?.user?.id;

    // Проверка прав доступа
    if (userId !== MY_ID) {
      document.body.innerHTML = `
        <div style="text-align:center; padding:50px 20px;">
          <h1>🚫 Доступ запрещён</h1>
          <p>У вас нет прав администратора.</p>
          <p>Ваш ID: ${userId}</p>
        </div>
      `;
      throw new Error('Access Denied');
    }

    const statusLabels = {
      'pending': '🆕 Новый',
      'cooking': '👨‍🍳 Готовится',
      'delivering': '🚀 В пути',
      'delivered': '✅ Доставлен',
      'cancelled': '❌ Отменён'
    };

    async function loadOrders() {
      const listEl = document.getElementById('orders-list');
      listEl.innerHTML = '<div class="empty-state">⏳ Загрузка заказов...</div>';

      try {
        const res = await fetch('/api/admin/orders');
        const orders = await res.json();
        renderOrders(orders);
        updateStats(orders);
      } catch (e) {
        listEl.innerHTML = '<div class="error-box">❌ Ошибка подключения к серверу</div>';      }
    }

    function updateStats(orders) {
      const newCount = orders.filter(o => o.status === 'pending').length;
      const activeCount = orders.filter(o => ['cooking', 'delivering'].includes(o.status)).length;
      const totalRev = orders.filter(o => o.status !== 'cancelled')
                             .reduce((sum, o) => sum + parseFloat(o.total_amount), 0);

      document.getElementById('stat-new').textContent = newCount;
      document.getElementById('stat-active').textContent = activeCount;
      document.getElementById('stat-count').textContent = orders.length;
      document.getElementById('stat-revenue').textContent = totalRev.toLocaleString() + '₽';
    }

    function renderOrders(orders) {
      const listEl = document.getElementById('orders-list');
      
      if (!orders || orders.length === 0) {
        listEl.innerHTML = '<div class="empty-state">📭 Заказов пока нет</div>';
        return;
      }

      listEl.innerHTML = orders.map(order => {
        // Распаковка товаров из JSON строки
        let itemsHtml = 'Нет информации о товарах';
        try {
          if (order.items) {
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            if (Array.isArray(items)) {
              itemsHtml = items.map(i => `• <b>${i.name}</b> x${i.qty}`).join('<br>');
            }
          }
        } catch (e) {
          itemsHtml = order.items || 'Ошибка чтения';
        }

        return `
          <div class="order-card">
            <div class="order-top">
              <span class="order-id">Заказ #${order.id}</span>
              <span class="badge status-${order.status}">${statusLabels[order.status] || order.status}</span>
            </div>
            
            <div class="order-info">
              📍 <b>${order.address || 'Адрес не указан'}</b>
            </div>
            ${order.comment ? `<div class="order-info">💬 ${order.comment}</div>` : ''}
            
            <div class="order-items-box">              ${itemsHtml}
            </div>

            <div class="order-top" style="margin-top:8px">
              <span style="font-weight:700; font-size:16px;">${parseFloat(order.total_amount).toLocaleString()} ₽</span>
              <span style="font-size:12px; color:#888;">${new Date(order.created_at).toLocaleString()}</span>
            </div>

            <select class="status-select" onchange="changeStatus(${order.id}, this.value)">
              ${Object.keys(statusLabels).map(key => 
                `<option value="${key}" ${order.status === key ? 'selected' : ''}>${statusLabels[key]}</option>`
              ).join('')}
            </select>
          </div>
        `;
      }).join('');
    }

    async function changeStatus(id, newStatus) {
      try {
        // Обновляем статус
        await fetch(`/api/admin/order/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });

        // Уведомляем бота (отправляем запрос на сервер)
        // В реальном приложении здесь лучше вызывать Telegram API напрямую с сервера, 
        // но для простоты отправляем запрос на наш endpoint notify
        // await fetch('/api/admin/notify', ...); 
        
        tg.HapticFeedback.notificationOccurred('success');
        loadOrders(); // Перезагружаем список
      } catch (e) {
        tg.HapticFeedback.notificationOccurred('error');
        alert('Ошибка изменения статуса');
      }
    }

    // Запуск
    loadOrders();
  </script>
</body>
</html>
