<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FoodHub</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Логотип -->
  <header class="app-header">
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="FoodHub" class="logo-icon">
      <span class="logo-text">FoodHub</span>
    </div>
    <button id="cart-btn" class="cart-btn hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-count">0</span>
    </button>
  </header>

  <!-- Меню -->
  <main id="menu-grid" class="menu-grid">
    <!-- Товары загрузятся через JS -->
  </main>

  <!-- Корзина (модальное окно) -->
  <div id="cart-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ваш заказ</h2>
        <button id="close-cart" class="modal-close">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">Итого: <span id="cart-total">0</span> ₽</div>
        <input type="text" id="address" class="input-field" placeholder="Адрес доставки">
        <textarea id="comment" class="input-field" placeholder="Комментарий к заказу"></textarea>
        <button id="submit-order" class="btn-primary">Оформить заказ</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
