<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ЕдаТут</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="loading">

  <!-- 1. ЗАСТАВКА (SPLASH SCREEN) -->
  <div id="splash-screen" class="splash-v2">
    <div class="splash-particles">
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
      <span class="burger-particle">🍔</span>
    </div>
    
    <div class="splash-content-v2">
      <div class="logo-container">
        <div class="logo-glow"></div>
        <!-- Временный логотип (иконка) -->
        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="ЕдаТут" class="splash-logo-v2">
        <div class="logo-ring"></div>
      </div>
      
      <h1 class="splash-title-v2">
        <span class="letter">Е</span>
        <span class="letter">д</span>
        <span class="letter">а</span>
        <span class="letter">Т</span>
        <span class="letter">у</span>
        <span class="letter">т</span>
      </h1>
      
      <div class="tagline">Быстро. Вкусно. Удобно.</div>
      
      <div class="splash-loader-v2">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <!-- 2. ОСНОВНОЕ ПРИЛОЖЕНИЕ -->  
  <!-- ЖИВАЯ ШАПКА (АНИМАЦИЯ) -->
  <header class="dynamic-header">
    <!-- Левая часть: Логотип -->
    <div class="header-logo">
      <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="logo">
      <span class="brand-name">ЕдаТут</span>
    </div>

    <!-- Правая часть: Цепочка анимации + Корзина -->
    <div class="header-right">
      <div class="chain-container">
        <!-- 1. Бургер (тянет) -->
        <span class="chain-item chain-burger">🍔</span>
        <!-- 2. Слоган (тянется) -->
        <span class="chain-item chain-slogan">Закажи у нас!</span>
        <!-- 3. Пицца (замыкает) -->
        <span class="chain-item chain-pizza">🍕</span>
      </div>
      
      <!-- Кнопка корзины (откуда всё вылетает) -->
      <button id="cart-btn" class="cart-btn hidden">
        <span id="cart-count">0</span>
      </button>
    </div>
  </header>

  <!-- Сетка меню -->
  <main id="menu-grid" class="menu-grid">
    <!-- Товары загрузятся через JS -->
  </main>

  <!-- Модальное окно корзины -->
  <div id="cart-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ваш заказ</h2>
        <button id="close-cart" class="modal-close">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">Итого: <span id="cart-total">0</span> ₽</div>
        <input type="text" id="address" class="input-field" placeholder="Адрес доставки">
        <textarea id="comment" class="input-field" placeholder="Комментарий к заказу"></textarea>
        <button id="submit-order" class="btn-primary">Оформить заказ</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script></body>
</html>
