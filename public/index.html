<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ЕдаТут</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="loading">

  <!-- ЗАСТАВКА -->
  <div id="splash-screen">
    <div class="splash-content">
      <div class="logo-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="Лого" class="splash-logo">
      </div>
      <h1 class="splash-title">ЕдаТут</h1>
      <div class="tagline">Быстро. Вкусно. Удобно.</div>
      <div class="loader"></div>
    </div>
  </div>

  <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
  <div id="main-app">
    
    <!-- Бегущая строка -->
    <div class="marquee-header">
      <div class="marquee-track">
        <div class="marquee-content">
          <span>🔥 СКИДКИ 50%</span><span class="dot">•</span>
          <span>🚀 ДОСТАВКА 15 МИН</span><span class="dot">•</span>
          <span>🍔 ЛУЧШИЕ БУРГЕРЫ</span><span class="dot">•</span>
          <span>⚡ ЗАКАЖИ СЕЙЧАС</span><span class="dot">•</span>
          <span>🎁 ПОДАРОК</span><span class="dot">•</span>
          <span>⭐ 1000+ ОТЗЫВОВ</span><span class="dot">•</span>
        </div>
        <div class="marquee-content">
          <span>🔥 СКИДКИ 50%</span><span class="dot">•</span>
          <span>🚀 ДОСТАВКА 15 МИН</span><span class="dot">•</span>
          <span>🍔 ЛУЧШИЕ БУРГЕРЫ</span><span class="dot">•</span>
          <span>⚡ ЗАКАЖИ СЕЙЧАС</span><span class="dot">•</span>
          <span>🎁 ПОДАРОК</span><span class="dot">•</span>
          <span>⭐ 1000+ ОТЗЫВОВ</span><span class="dot">•</span>
        </div>
      </div>
    </div>

    <!-- Навигация -->
    <div class="app-nav">      <button id="profile-btn" class="nav-btn">👤</button>
      <span class="nav-title">Меню</span>
      <button id="cart-btn" class="nav-btn cart-btn hidden">
        🛒 <span id="cart-count">0</span>
      </button>
    </div>

    <!-- Категории -->
    <div class="categories-container">
      <button class="cat-btn active" data-cat="all">🔥 Все</button>
      <button class="cat-btn" data-cat="burger">🍔 Бургеры</button>
      <button class="cat-btn" data-cat="pizza">🍕 Пицца</button>
      <button class="cat-btn" data-cat="drink">🥤 Напитки</button>
      <button class="cat-btn" data-cat="fry">🍟 Фритюр</button>
    </div>

    <!-- Сетка товаров -->
    <main id="menu-grid" class="menu-grid"></main>
  </div>

  <!-- Корзина -->
  <div id="cart-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Корзина</h2>
        <button id="close-cart" class="modal-close">&times;</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">Итого: <span id="cart-total">0</span> ₽</div>
        <input type="text" id="address" class="input-field" placeholder="Адрес доставки">
        <textarea id="comment" class="input-field" placeholder="Комментарий"></textarea>
        <button id="submit-order" class="btn-primary">Оформить заказ</button>
      </div>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-content profile-modal-content">
      <div class="modal-header">
        <h2>Профиль</h2>
        <button id="close-profile" class="modal-close">&times;</button>
      </div>
      <div class="profile-menu">
        <div class="profile-item">📦 Мои заказы</div>
        <div class="profile-item">❤️ Избранное</div>
        <div class="profile-item">⚙️ Настройки</div>
      </div>
    </div>  </div>

  <script src="app.js"></script>
</body>
</html>
